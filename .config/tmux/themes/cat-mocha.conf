# Status bar
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 100
set -g status-right-length 100

# Status left
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e,nobold]"

# Status right
# set -g status-right "#[fg=#1e1e2e,bg=#a6e3a1] #h #[fg=#a6e3a1,bg=#1e1e2e]"
set -g status-right ""

# Center windows
set -g status-justify centre
set -g window-status-separator ""

# Inactive window
setw -g window-status-format "#[fg=#6c7086,bg=#1e1e2e] #I:#W "

# Active window
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7,bold] #I:#W "

# Window styles
set-window-option -g window-status-style "bg=#1e1e2e,fg=#cdd6f4"
set-window-option -g window-status-current-style "bg=#cba6f7,fg=#1e1e2e,bold"

# Pane borders
set-option -g pane-border-style "fg=#313244"
set-option -g pane-active-border-style "fg=#89b4fa"

# Messages
set-option -g message-style "bg=#1e1e2e,fg=#cdd6f4"
set-option -g message-command-style "bg=#1e1e2e,fg=#f9e2af"

# Copy mode
set-option -g mode-style "bg=#45475a,fg=#cdd6f4"

# Clock
set-window-option -g clock-mode-colour "#89b4fa"

# Better borders

set -g pane-border-format "#P #{pane_current_command}"

# Active pane
set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-style "fg=#313244"
